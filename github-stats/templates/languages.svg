<svg id="gh-dark-mode-only" width="450" height="240" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: #ffffff;
  stroke: #d0d7de;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke: #30363d;
}

#accent-top {
  fill: #0969da;
}

#gh-dark-mode-only:target #accent-top {
  fill: #00d9ff;
}

foreignObject {
  width: calc(100% - 42px);
  height: calc(100% - 32px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.6em;
  line-height: 24px;
  font-size: 15px;
  font-weight: 700;
  color: #0969da;
}

#gh-dark-mode-only:target h2 {
  color: #00d9ff;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 12px;
  margin-right: 8px;
  margin-bottom: 4px;
  align-items: center;
  flex-wrap: nowrap;
  min-width: 88px;
  transform: translateX(-500%);
  animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}

div.ellipsis {
  height: 100%;
  overflow: hidden;
}

.octicon {
  fill: rgb(88, 96, 105);
  margin-right: 4px;
  vertical-align: middle;
  flex-shrink: 0;
}

#gh-dark-mode-only:target .octicon {
  color: #8b949e;
  fill: #8b949e;
}

.progress {
  display: flex;
  height: 11px;
  overflow: hidden;
  background-color: #eaeef2;
  border-radius: 6px;
  outline: 1px solid transparent;
  margin-bottom: 1.1em;
}

#gh-dark-mode-only:target .progress {
  background-color: rgba(110, 118, 129, 0.3);
}

.progress-item {
  outline: 2px solid #ffffff;
  border-collapse: collapse;
}

#gh-dark-mode-only:target .progress-item {
  outline: 2px solid #0d1117;
}

.lang {
  font-weight: 600;
  margin-right: 3px;
  color: #24292f;
}

#gh-dark-mode-only:target .lang {
  color: #c9d1d9;
}

.percent {
  color: #57606a;
  font-size: 11px;
}

#gh-dark-mode-only:target .percent {
  color: #8b949e;
}
</style>
<g>
<rect x="5" y="5" id="background" />
<rect x="5" y="5" width="440" height="4" rx="2" id="accent-top" />
<g>
<foreignObject x="21" y="20" width="408" height="208">
<div xmlns="http://www.w3.org/1999/xhtml" class="ellipsis">

<h2>Languages Used</h2>

<div>
<span class="progress">
{{ progress }}
</span>
</div>

<ul>

{{ lang_list }}

</ul>

</div>
</foreignObject>
</g>
</g>
</svg>
