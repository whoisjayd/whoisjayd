<svg id="gh-dark-mode-only" width="450" height="205" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: #ffffff;
  stroke: #d0d7de;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke: #30363d;
}

#accent-top {
  fill: #0969da;
}

#gh-dark-mode-only:target #accent-top {
  fill: #00d9ff;
}

foreignObject {
  width: calc(100% - 42px);
  height: calc(100% - 32px);
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th {
  padding: 0.5em 0.25em 0.5em 0;
  text-align: left;
  font-size: 15px;
  font-weight: 700;
  color: #0969da;
}

#gh-dark-mode-only:target th {
  color: #00d9ff;
}

td {
  padding: 0.25em 0.25em;
  font-size: 12px;
  line-height: 18px;
  color: #57606a;
  vertical-align: middle;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#gh-dark-mode-only:target td {
  color: #8b949e;
}

td.repo-name {
  font-weight: 600;
  color: #1f2328;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#gh-dark-mode-only:target td.repo-name {
  color: #c9d1d9;
}

td.repo-meta {
  text-align: right;
  white-space: nowrap;
  color: #57606a;
  font-size: 11px;
  padding-right: 0;
}

#gh-dark-mode-only:target td.repo-meta {
  color: #8b949e;
}

tr {
  transform: translateX(-200%);
  animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.octicon {
  fill: #57606a;
  margin-right: 0.4ch;
  vertical-align: middle;
}

#gh-dark-mode-only:target .octicon {
  fill: #8b949e;
}

.star-icon {
  fill: #bf8700;
}

#gh-dark-mode-only:target .star-icon {
  fill: #e3b341;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}
</style>
<g>
<rect x="5" y="5" id="background" />
<rect x="5" y="5" width="440" height="4" rx="2" id="accent-top" />
<g>
<foreignObject x="21" y="20" width="408" height="173">
<div xmlns="http://www.w3.org/1999/xhtml">

<table>
<thead><tr style="transform: translateX(0);">
<th colspan="2"><svg class="octicon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" width="14" height="14"><path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"></path></svg>Top Repositories</th>
</tr></thead>
<tbody>

{{ repo_rows }}

</tbody>
</table>

</div>
</foreignObject>
</g>
</g>
</svg>
