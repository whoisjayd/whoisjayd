<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: #ffffff;
  stroke: #d0d7de;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke: #30363d;
}

#accent-top {
  fill: #0969da;
}

#gh-dark-mode-only:target #accent-top {
  fill: #00d9ff;
}

foreignObject {
  width: calc(100% - 42px);
  height: calc(100% - 32px);
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th {
  padding: 0.5em 0.25em 0.5em 0;
  text-align: left;
  font-size: 15px;
  font-weight: 700;
  color: #0969da;
}

#gh-dark-mode-only:target th {
  color: #00d9ff;
}

td {
  padding: 0.25em 0.25em;
  font-size: 12px;
  line-height: 18px;
  color: #57606a;
  vertical-align: middle;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#gh-dark-mode-only:target td {
  color: #8b949e;
}

td.repo-name {
  font-weight: 600;
  color: #1f2328;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#gh-dark-mode-only:target td.repo-name {
  color: #c9d1d9;
}

td.repo-meta {
  text-align: right;
  white-space: nowrap;
  color: #57606a;
  font-size: 11px;
  padding-right: 0;
}

#gh-dark-mode-only:target td.repo-meta {
  color: #8b949e;
}

tr {
  transform: translateX(-200%);
  animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.octicon {
  fill: #57606a;
  margin-right: 0.4ch;
  vertical-align: middle;
}

#gh-dark-mode-only:target .octicon {
  fill: #8b949e;
}

.star-icon {
  fill: #bf8700;
}

#gh-dark-mode-only:target .star-icon {
  fill: #e3b341;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}
</style>
