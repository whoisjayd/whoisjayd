name: Generate README Stats

on:
  push:
    branches: [master, main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate README
        run: python main.py
        env:
          ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          EXCLUDE_FORKED_REPOS: "true"

      - name: Commit updated stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/*.svg
          git diff --staged --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
